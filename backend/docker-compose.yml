# ═══════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE — Insurance Policy Management System
# ═══════════════════════════════════════════════════════════════════════════
#
# INTERVIEW TIP: Docker Compose vs Kubernetes
# ────────────────────────────────────────────
# Docker Compose: best for local development and simple deployments
#   - Single host, single file, simple networking
# Kubernetes: best for production, multi-node, high availability
#   - Container orchestration, auto-scaling, rolling updates, service discovery
#
# SERVICES IN THIS COMPOSE:
# 1. postgres  → PostgreSQL database (data tier)
# 2. app       → Spring Boot application (application tier)
#
# Run: docker-compose up --build
# Stop: docker-compose down
# Stop + delete volumes: docker-compose down -v
# ═══════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ─── POSTGRESQL DATABASE ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine    # Alpine = minimal OS, smaller image size
    container_name: insurance-postgres

    environment:
      # These environment variables are read by the postgres image at startup
      # to initialize the database with these credentials.
      POSTGRES_DB: insurance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      # HOST:CONTAINER port mapping
      # Exposes PostgreSQL on the host at port 5432 for tools like pgAdmin, DBeaver
      - "5432:5432"

    volumes:
      # Named volume: persists data even if the container is removed.
      # Without this, ALL database data is lost when container is deleted!
      # INTERVIEW TIP: Named volumes are managed by Docker. Bind mounts (./data:/var/lib/postgresql/data)
      # mount a host directory. Named volumes are preferred for databases (Docker manages them).
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      # pg_isready: PostgreSQL utility that checks if the server is ready for connections
      # Compose waits for this to succeed before starting the app container (via depends_on)
      test: ["CMD-SHELL", "pg_isready -U postgres -d insurance_db"]
      interval: 10s       # check every 10 seconds
      timeout: 5s         # fail if no response in 5s
      retries: 5          # try 5 times before marking as unhealthy
      start_period: 30s   # wait 30s before starting health checks (DB startup time)

    networks:
      - insurance-network

    restart: unless-stopped  # Restart container unless manually stopped

  # ─── SPRING BOOT APPLICATION ───────────────────────────────────────────
  app:
    build:
      context: .          # Build context: current directory (backend/)
      dockerfile: Dockerfile
    container_name: insurance-app

    ports:
      - "8080:8080"       # Expose API on host port 8080

    environment:
      # Spring Boot profile (activates application-docker.yml settings)
      SPRING_PROFILES_ACTIVE: docker

      # Database connection (overrides application-docker.yml if needed)
      # 'postgres' here is the service name — Docker Compose's DNS resolves
      # service names to container IPs within the same network.
      # INTERVIEW TIP: Containers on the same Docker network can resolve
      # each other by service name. No need for hard-coded IP addresses.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/insurance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

      # JWT Configuration (override in production with secrets manager)
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000

      # JVM memory settings (can also be in JAVA_OPTS)
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

    depends_on:
      # Wait for postgres to be healthy before starting the app
      # INTERVIEW TIP: depends_on with condition: service_healthy uses the health check
      # defined on the postgres service. Without this, the app might start before
      # the database is ready and fail with "connection refused".
      postgres:
        condition: service_healthy

    networks:
      - insurance-network

    restart: unless-stopped

    # Resource limits (important for production)
    # Prevents the app from consuming all host memory
    deploy:
      resources:
        limits:
          memory: 512M      # Max 512MB RAM
          cpus: '1.0'       # Max 1 CPU core
        reservations:
          memory: 256M      # Reserve minimum 256MB RAM

# ─── NAMED VOLUMES ────────────────────────────────────────────────────────
# Volumes declared here are created and managed by Docker.
# Data persists across container restarts and recreations.
volumes:
  postgres_data:
    name: insurance_postgres_data    # Explicit name (easier to identify in docker volume ls)

# ─── NETWORKS ─────────────────────────────────────────────────────────────
# Custom bridge network: services can communicate by name.
# Isolated from other containers not on this network.
# INTERVIEW TIP: Docker's default bridge network doesn't support DNS resolution.
# Custom networks do — that's why we define 'insurance-network' here.
networks:
  insurance-network:
    name: insurance-network
    driver: bridge
